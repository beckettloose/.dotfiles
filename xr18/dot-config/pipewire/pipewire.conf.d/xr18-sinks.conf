context.modules = [
  # Main Audio Output -> XR18 In 1/2
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Main Audio Output (XR18 In 1/2)"
      capture.props = {
        node.name      = "remap_main_out"
        media.class    = "Audio/Sink"
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props = {
        node.name      = "remap_main_out_playback"
        audio.channels = 2
        audio.position = [ AUX0 AUX1 ]
        target.object  = "alsa_output.usb-BEHRINGER_X18_XR18_32065F4B-00.multichannel-output"
        stream.dont-remix = true
        node.passive   = true
      }
    }
  }

  # Chat Audio Output -> XR18 In 6 (mono, mapped to LFE/ch6)
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Chat Audio Output (XR18 In 6)"
      capture.props = {
        node.name      = "remap_chat_out"
        media.class    = "Audio/Sink"
        audio.channels = 1
        audio.position = [ MONO ]
      }
      playback.props = {
        node.name      = "remap_chat_out_playback"
        audio.channels = 1
        audio.position = [ AUX5 ]
        target.object  = "alsa_output.usb-BEHRINGER_X18_XR18_32065F4B-00.multichannel-output"
        stream.dont-remix = true
        node.passive   = true
      }
    }
  }

  # Media Audio Output -> XR18 In 7/8
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Media Audio Output (XR18 In 7/8)"
      capture.props = {
        node.name      = "remap_media_out"
        media.class    = "Audio/Sink"
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props = {
        node.name      = "remap_media_out_playback"
        audio.channels = 2
        audio.position = [ AUX6 AUX7 ]
        target.object  = "alsa_output.usb-BEHRINGER_X18_XR18_32065F4B-00.multichannel-output"
        stream.dont-remix = true
        node.passive   = true
      }
    }
  }
]
